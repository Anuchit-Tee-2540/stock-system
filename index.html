}

// ─── SEARCH DROPDOWN ───
function SearchDropdown({ items, value, onChange, onSelect }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState(value?.name || "");
  const ref = useRef(null);
  const filtered = query.length > 0
    ? items.filter(s => s.name.includes(query) || s.id.toLowerCase().includes(query.toLowerCase())).slice(0,8)
    : items.slice(0,8);
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  useEffect(() => { if (value?.name) setQuery(value.name); }, [value]);
  return (
    <div ref={ref} style={{position:"relative",width:"100%"}}>
      <input value={query}
        onChange={e => { setQuery(e.target.value); setOpen(true); onChange(e.target.value); }}
        onFocus={() => setOpen(true)}
        placeholder="พิมพ์ชื่อหรือรหัส..."
        style={{width:"100%",border:`1.5px solid ${value?.id?theme.secondary:theme.border}`,borderRadius:6,padding:"5px 8px",fontSize:12,background:value?.id?"#FFF0F5":"#fff",outline:"none",boxSizing:"border-box"}} />
      {open && filtered.length > 0 && (
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:`1.5px solid ${theme.border}`,borderRadius:8,zIndex:999,boxShadow:"0 8px 24px rgba(139,26,74,0.15)",maxHeight:240,overflowY:"auto"}}>
          {filtered.map(item => (
            <div key={item.id}
              onMouseDown={() => { onSelect(item); setQuery(item.name); setOpen(false); }}
              style={{padding:"8px 12px",cursor:"pointer",borderBottom:`1px solid ${theme.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,background:"#fff"}}
              onMouseEnter={e => e.currentTarget.style.background=theme.light}
              onMouseLeave={e => e.currentTarget.style.background="#fff"}>
              <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                {item.image
                  ? <img src={item.image} alt={item.name} style={{width:32,height:32,objectFit:"cover",borderRadius:6,flexShrink:0,border:`1px solid ${theme.border}`}}/>
                  : <div style={{width:32,height:32,borderRadius:6,background:theme.light,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>📦</div>
                }
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:theme.primary}}>{item.name}</div>
                  <div style={{fontSize:10,color:theme.muted}}>{item.id} · {item.category} · {item.price?.toLocaleString()} บ./หน่วย</div>
                </div>
              </div>
              <div style={{fontSize:11,color:item.stock<=5?"#e53935":"#2e7d32",fontWeight:700,background:item.stock<=5?"#FFEBEE":"#E8F5E9",padding:"2px 8px",borderRadius:20,flexShrink:0}}>
                {item.stock} {item.unit}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── DASHBOARD ───
function DashboardPage({ stockItems }) {
  const totalValue = stockItems.reduce((s,i) => s+i.stock*i.price, 0);
  const lowStock = stockItems.filter(i => i.stock<=5);
  const categories = [...new Set(stockItems.map(i => i.category))];
  const catStats = categories.map(cat => { const its=stockItems.filter(i=>i.category===cat); return {cat,count:its.length,total:its.reduce((s,i)=>s+i.stock,0)}; });
  const alerts = stockItems.filter(i=>i.stock<=8).sort((a,b)=>a.stock-b.stock).slice(0,5);
  const topValue = [...stockItems].sort((a,b)=>b.stock*b.price-a.stock*a.price).slice(0,5);
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {[{icon:"📦",label:"รายการทั้งหมด",value:stockItems.length,unit:"รายการ",color:theme.primary},{icon:"💰",label:"มูลค่า Stock รวม",value:totalValue.toLocaleString(),unit:"บาท",color:"#1565C0"},{icon:"⚠️",label:"ของใกล้หมด",value:lowStock.length,unit:"รายการ",color:"#E65100"},{icon:"🗂️",label:"หมวดหมู่",value:categories.length,unit:"หมวด",color:"#2E7D32"}].map((c,i) => (
          <div key={i} style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:`1px solid ${theme.border}`,boxShadow:"0 2px 8px rgba(139,26,74,0.07)"}}>
            <div style={{fontSize:22,marginBottom:4}}>{c.icon}</div>
            <div style={{fontSize:20,fontWeight:800,color:c.color}}>{c.value}</div>
            <div style={{fontSize:10,color:theme.muted}}>{c.unit}</div>
            <div style={{fontSize:11,color:theme.text,marginTop:2,fontWeight:600}}>{c.label}</div>
          </div>

      <div style={{background:"#fff",borderRadius:14,border:`1px solid ${theme.border}`,overflow:"hidden",marginBottom:14}}>
        <div style={{background:theme.gradient,padding:"10px 16px"}}><span style={{fontWeight:700,color:"#fff",fontSize:13}}>🗂️ สรุปแยกตามหมวดหมู่</span></div>
        {catStats.map((c,i) => (
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:i<catStats.length-1?`1px solid ${theme.border}`:"none",background:i%2===0?"#fff":theme.light}}>
            <div><span style={{fontWeight:600,fontSize:13}}>{c.cat}</span><span style={{fontSize:10,color:theme.muted,marginLeft:8}}>{c.count} รายการ</span></div>
            <div><span style={{fontWeight:700,fontSize:13,color:theme.primary}}>{c.total.toLocaleString()}</span><span style={{fontSize:10,color:theme.muted,marginLeft:4}}>ชิ้น</span></div>
          </div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:14,border:"1px solid #FFE082",overflow:"hidden",marginBottom:14}}>
        <div style={{background:"linear-gradient(135deg,#E65100,#FF8F00)",padding:"10px 16px"}}><span style={{fontWeight:700,color:"#fff",fontSize:13}}>⚠️ แจ้งเตือน Stock ใกล้หมด</span></div>
        {alerts.length===0 && <div style={{padding:16,color:theme.muted,fontSize:12,textAlign:"center"}}>ไม่มีรายการใกล้หมด ✅</div>}
        {alerts.map((item,i) => (
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:i<alerts.length-1?"1px solid #FFF3E0":"none"}}>

        ))}

        <div style={{background:"linear-gradient(135deg,#1565C0,#1976D2)",padding:"10px 16px"}}><span style={{fontWeight:700,color:"#fff",fontSize:13}}>💎 มูลค่าสูงสุด Top 5</span></div>

// ─── STOCK LIST ───
function StockListPage({ stockItems, setStockItems, categories }) {
  const [search, setSearch] = useState("");
  const [filterCat, setFilterCat] = useState("ทั้งหมด");
  const [delConfirm, setDelConfirm] = useState(null);
  const [editItem, setEditItem] = useState(null);
  const [showAddForm, setShowAddForm] = useState(false);
  const [delAllConfirm, setDelAllConfirm] = useState(false);

  const allCats = ["ทั้งหมด", ...new Set(stockItems.map(i => i.category))];
  const filtered = stockItems.filter(i =>
    (i.name.includes(search) || i.id.toLowerCase().includes(search.toLowerCase())) &&
    (filterCat === "ทั้งหมด" || i.category === filterCat)
  );

  const emptyForm = {id:"",name:"",category:"",unit:"ชิ้น",stock:"",price:"",image:""};
  const [form, setForm] = useState(emptyForm);
  const [imgUploading, setImgUploading] = useState(false);
  const [imgError, setImgError] = useState("");
  const [formErr, setFormErr] = useState({});
  const units2 = ["ชิ้น","อัน","ใบ","ชุด","กล่อง","แพ็ค","คู่","ดอก","เส้น","ม้วน","รีม"];

  const openAdd = () => { setForm(emptyForm); setFormErr({}); setEditItem(null); setShowAddForm(true); };
  const openEdit = item => { setForm({id:item.id,name:item.name,category:item.category,unit:item.unit,stock:item.stock,price:item.price,image:item.image||""}); setFormErr({}); setImgError(""); setEditItem(item.id); setShowAddForm(true); };
  const closeForm = () => { setShowAddForm(false); setEditItem(null); setForm(emptyForm); setFormErr({}); setImgError(""); };

  const validateForm = () => {
    const e={};
    if (!form.name.trim()) e.name="กรุณากรอกชื่อ";
    if (!form.category) e.category="กรุณาเลือกหมวดหมู่";
    if (form.stock==="" || isNaN(form.stock)) e.stock="กรุณากรอกจำนวน";
    if (form.price==="" || isNaN(form.price)) e.price="กรุณากรอกราคา";
    return e;
  };

  const handleSave = () => {
    const e = validateForm();
    if (Object.keys(e).length) { setFormErr(e); return; }
    if (editItem) {
      const updated = {...form, stock:Number(form.stock), price:Number(form.price)};
      setStockItems(p => p.map(i => i.id===editItem ? {...i,...updated} : i));
      if (window._db) window._db.collection('stockItems').doc(editItem).set({...form,stock:Number(form.stock),price:Number(form.price)}).catch(console.error);
    } else {
      const newId = form.id.trim() || ("ITEM-"+String(stockItems.length+1).padStart(3,"0"));
      const newItem = {...form, id:newId, stock:Number(form.stock), price:Number(form.price)};
      setStockItems(p => [...p, newItem]);
      if (window._db) window._db.collection('stockItems').doc(newId).set(newItem).catch(console.error);
    }
    closeForm();
  };

  const handleDelete = id => { setStockItems(p=>p.filter(i=>i.id!==id)); setDelConfirm(null); };
  const handleDeleteAll = () => { setStockItems([]); setDelAllConfirm(false); };

  const inp2 = (err) => ({width:"100%",border:`1.5px solid ${err?"#e53935":theme.border}`,borderRadius:8,padding:"8px 12px",fontSize:12,background:"#fafafa",outline:"none",boxSizing:"border-box"});

  return (
    <div>
      {/* Modal แก้ไข/เพิ่ม */}
      {showAddForm && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:420,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 16px 48px rgba(0,0,0,0.2)"}}>
            <div style={{background:theme.gradient,padding:"14px 18px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:700,color:"#fff",fontSize:15}}>{editItem?"✏️ แก้ไขรายการ":"➕ เพิ่มรายการใหม่"}</span>
              <button onClick={closeForm} style={{background:"rgba(255,255,255,0.2)",color:"#fff",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:14,fontWeight:700}}>✕</button>
            </div>
            <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
              <div>
                <label style={{fontSize:11,fontWeight:600,color:theme.primary,display:"block",marginBottom:4}}>ชื่อรายการ *</label>
                <input value={form.name} onChange={e=>{setForm(p=>({...p,name:e.target.value}));setFormErr(p=>({...p,name:""}));}} placeholder="เช่น พาสพนักงาน" style={inp2(formErr.name)} />
                {formErr.name && <div style={{fontSize:10,color:"#e53935",marginTop:3}}>⚠ {formErr.name}</div>}
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:600,color:theme.primary,display:"block",marginBottom:4}}>รหัส (ID)</label>
                <input value={form.id} onChange={e=>setForm(p=>({...p,id:e.target.value}))} placeholder="เช่น PASS-001 (ไม่กรอก=อัตโนมัติ)" style={inp2(false)} disabled={!!editItem} />
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:600,color:theme.primary,display:"block",marginBottom:4}}>หมวดหมู่ *</label>
                <select value={form.category} onChange={e=>{setForm(p=>({...p,category:e.target.value}));setFormErr(p=>({...p,category:""}));}} style={inp2(formErr.category)}>
                  <option value="">-- เลือกหมวดหมู่ --</option>
                  {categories.map(c=><option key={c}>{c}</option>)}
                </select>
                {formErr.category && <div style={{fontSize:10,color:"#e53935",marginTop:3}}>⚠ {formErr.category}</div>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div>
                  <label style={{fontSize:11,fontWeight:600,color:theme.primary,display:"block",marginBottom:4}}>จำนวน *</label>
                  <input type="number" value={form.stock} onChange={e=>{setForm(p=>({...p,stock:e.target.value}));setFormErr(p=>({...p,stock:""}));}} placeholder="0" style={inp2(formErr.stock)} />
                  {formErr.stock && <div style={{fontSize:10,color:"#e53935",marginTop:3}}>⚠ {formErr.stock}</div>}
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:600,color:theme.primary,display:"block",marginBottom:4}}>หน่วย *</label>
                  <select value={form.unit} onChange={e=>setForm(p=>({...p,unit:e.target.value}))} style={inp2(false)}>
                    {units2.map(u=><option key={u}>{u}</option>)}

                </div>
              </div>

                <input type="number" value={form.price} onChange={e=>{setForm(p=>({...p,price:e.target.value}));setFormErr(p=>({...p,price:""}));}} placeholder="0.00" style={inp2(formErr.price)} />
                {formErr.price && <div style={{fontSize:10,color:"#e53935",marginTop:3}}>⚠ {formErr.price}</div>}
              </div>
              {/* รูปภาพ */}
              <div>
                <label style={{fontSize:11,fontWeight:600,color:theme.primary,display:"block",marginBottom:4}}>รูปภาพอุปกรณ์</label>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  {form.image && <img src={form.image} alt="preview" style={{width:64,height:64,objectFit:"cover",borderRadius:8,border:`1px solid ${theme.border}`}}/>}
                  <label style={{flex:1,border:`2px dashed ${theme.border}`,borderRadius:8,padding:"10px",textAlign:"center",cursor:"pointer",background:"#fafafa",fontSize:12,color:theme.muted}}>
                    {imgUploading ? "⏳ กำลังอัปโหลด..." : "📷 เลือกรูปภาพ"}
                    <input type="file" accept="image/*" style={{display:"none"}} onChange={async e => {
                      const file = e.target.files[0];
                      if (!file) return;
                      setImgUploading(true); setImgError("");
                      try {
                        const url = await uploadToCloudinary(file);
                        setForm(p=>({...p,image:url}));
                      } catch(err) { setImgError("❌ อัปโหลดไม่สำเร็จ: "+err.message); }
                      finally { setImgUploading(false); }
                    }}/>
                  </label>
                  {form.image && <button onClick={()=>setForm(p=>({...p,image:""}))} style={{background:"#FFEBEE",color:"#e53935",border:"none",borderRadius:7,padding:"6px 10px",fontSize:11,cursor:"pointer"}}>✕ ลบรูป</button>}

                </button>
                <button onClick={closeForm} style={{flex:1,background:"#f5f5f5",color:theme.muted,border:"none",borderRadius:10,padding:"12px",fontWeight:600,fontSize:13,cursor:"pointer"}}>ยกเลิก</button>
              </div>
            </div>
          </div>

      )}

      {/* Search & Filter */}
      <div style={{background:"#fff",borderRadius:12,padding:14,marginBottom:12,border:`1px solid ${theme.border}`}}>

        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {allCats.map(cat=>(
            <button key={cat} onClick={()=>setFilterCat(cat)}
              style={{padding:"5px 12px",borderRadius:20,border:`1.5px solid ${filterCat===cat?theme.primary:theme.border}`,background:filterCat===cat?theme.gradient:"#fff",color:filterCat===cat?"#fff":theme.muted,fontSize:11,fontWeight:filterCat===cat?700:400,cursor:"pointer"}}>
              {cat}
            </button>
          ))}
        </div>
      </div>

      {/* Toolbar */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:11,color:theme.muted}}>แสดง {filtered.length} จาก {stockItems.length} รายการ</div>
        <div style={{display:"flex",gap:6}}>
          {delAllConfirm
            ? <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:11,color:"#e53935"}}>ลบทั้งหมด?</span>
                <button onClick={handleDeleteAll} style={{background:"#e53935",color:"#fff",border:"none",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>ยืนยัน</button>
                <button onClick={()=>setDelAllConfirm(false)} style={{background:"#f5f5f5",color:theme.muted,border:"none",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>ยกเลิก</button>
              </div>
            : <>
                {stockItems.length>0 && <button onClick={()=>setDelAllConfirm(true)} style={{background:"#FFEBEE",color:"#e53935",border:"1px solid #FFCDD2",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>🗑️ ลบทั้งหมด</button>}
                <button onClick={openAdd} style={{background:theme.gradient,color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontSize:11,fontWeight:700,cursor:"pointer",boxShadow:"0 2px 8px rgba(139,26,74,0.25)"}}>➕ เพิ่มรายการ</button>
              </>
          }
        </div>
      </div>

      {/* ไม่มีรายการ */}
      {filtered.length===0 && (
        <div style={{textAlign:"center",padding:48,background:"#fff",borderRadius:14,border:`1px solid ${theme.border}`,color:theme.muted}}>
          <div style={{fontSize:32,marginBottom:8}}>📭</div>
          <div style={{fontSize:13,marginBottom:12}}>ยังไม่มีรายการ Stock</div>
          <button onClick={openAdd} style={{background:theme.gradient,color:"#fff",border:"none",borderRadius:10,padding:"10px 24px",fontWeight:700,fontSize:13,cursor:"pointer"}}>➕ เพิ่มรายการแรก</button>
        </div>
      )}

      {/* รายการ */}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.map(item=>(
          <div key={item.id} style={{background:"#fff",borderRadius:12,border:`1px solid ${item.stock<=5?"#FFCDD2":theme.border}`,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
            {item.image && <img src={item.image} alt={item.name} style={{width:48,height:48,objectFit:"cover",borderRadius:8,flexShrink:0,border:`1px solid ${theme.border}`}}/>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{item.name}</div>
              <div style={{fontSize:10,color:theme.muted}}>{item.id} · {item.category}</div>
              <div style={{fontSize:11,color:theme.muted,marginTop:3}}>{item.price.toLocaleString()} บาท / {item.unit}</div>
            </div>
            <div style={{textAlign:"right",marginRight:8}}>
              <div style={{fontSize:18,fontWeight:800,color:item.stock<=5?"#c62828":item.stock<=10?"#E65100":theme.primary}}>{item.stock}</div>
              <div style={{fontSize:10,color:theme.muted}}>{item.unit}</div>
              <div style={{marginTop:4,fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:20,background:item.stock<=5?"#FFEBEE":item.stock<=10?"#FFF3E0":"#E8F5E9",color:item.stock<=5?"#c62828":item.stock<=10?"#E65100":"#2e7d32"}}>
                {item.stock<=5?"⚠️ ใกล้หมด":item.stock<=10?"🟡 ปานกลาง":"✅ ปกติ"}
              </div>
            </div>
            {/* ปุ่ม edit/delete */}
            <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
              <button onClick={()=>openEdit(item)} style={{background:"#E3F2FD",color:"#1565C0",border:"1px solid #BBDEFB",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>✏️</button>
              {delConfirm===item.id
                ? <div style={{display:"flex",flexDirection:"column",gap:3}}>
                    <button onClick={()=>handleDelete(item.id)} style={{background:"#e53935",color:"#fff",border:"none",borderRadius:6,padding:"3px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>ลบ</button>
                    <button onClick={()=>setDelConfirm(null)} style={{background:"#f5f5f5",color:theme.muted,border:"none",borderRadius:6,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>ยกเลิก</button>
                  </div>
                : <button onClick={()=>setDelConfirm(item.id)} style={{background:"#FFEBEE",color:"#e53935",border:"1px solid #FFCDD2",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>🗑️</button>
              }
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

  // จัดการหมวดหมู่
  const [newCat, setNewCat] = useState("");

  const [showCatManager, setShowCatManager] = useState(false);

  const addCategory = () => {
    const t = newCat.trim();
    if (!t) return;
    if (categories.includes(t)) { alert("มีหมวดหมู่นี้แล้ว"); return; }
    setCategories(p=>[...p, t]);
    setNewCat("");
  };
  const deleteCategory = cat => {
    setCategories(p=>p.filter(c=>c!==cat));
    setDelCatConfirm(null);
    if (form.category===cat) setForm(p=>({...p,category:""}));
  };

  const validate = () => {
    const e={};
    if (!form.name.trim()) e.name="กรุณากรอกชื่อรายการ";
    if (!form.category) e.category="กรุณาเลือกหมวดหมู่";

      id: form.sku.trim() || ("ITEM-" + Date.now()),

                          <button onClick={()=>setDelCatConfirm(null)} style={{background:"#f5f5f5",color:theme.muted,border:"none",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>ยกเลิก</button>
                        </div>
                      : <button onClick={()=>setDelCatConfirm(cat)} style={{background:"#FFEBEE",color:"#e53935",border:"1px solid #FFCDD2",borderRadius:6,padding:"3px 10px",fontSize:11,cursor:"pointer"}}>🗑️ ลบ</button>
                    }
                  </div>
                ))}
              </div>
            )}

          {/* SKU */}
          <div style={{padding:"11px 14px",background:"#fff"}}>
            <div style={{fontSize:11,fontWeight:600,color:theme.primary,marginBottom:5}}>รหัสรายการ (SKU)</div>

          <div style={{padding:"11px 14px",background:theme.light}}>
            <div style={{fontSize:11,fontWeight:600,color:theme.primary,marginBottom:5}}>ยี่ห้อ / รุ่น</div>
            <input value={form.brand} onChange={e=>setForm(p=>({...p,brand:e.target.value}))} placeholder="ระบุยี่ห้อหรือรุ่น (ถ้ามี)" style={inp()} />
          </div>

      </div>

      {/* ─ จำนวน ราคา หน่วย ─ */}

        <div style={{border:`1px solid ${theme.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden"}}>
          <div style={{padding:"11px 14px",background:"#fff"}}>
            <div style={{fontSize:11,fontWeight:600,color:theme.primary,marginBottom:5}}>จำนวนที่รับเข้า *</div>

          <div style={{padding:"11px 14px",background:"#fff"}}>

                setImgUploading(true); setImgError("");
                try { const url=await uploadToCloudinary(file); setForm(p=>({...p,image:url})); }
                catch(err) { setImgError("❌ "+err.message); }
                finally { setImgUploading(false); }
              }}/>
            </label>
            {form.image && <button onClick={()=>setForm(p=>({...p,image:""}))} style={{background:"#FFEBEE",color:"#e53935",border:"1px solid #FFCDD2",borderRadius:8,padding:"8px 12px",fontSize:12,cursor:"pointer"}}>🗑️ ลบรูป</button>}

          {imgError && <div style={{fontSize:11,color:"#e53935",marginTop:6}}>{imgError}</div>}
        </div>
      </div>

      <div style={{display:"flex",gap:10}}>

          {saved?"✅ บันทึกสำเร็จ!":"✅ บันทึกรายการ"}
        </button>
        <button onClick={()=>{setForm({name:"",category:"",sku:"",brand:"",qty:"",unit:"ชิ้น",price:"",minStock:"",date:"",po:"",location:"",note:"",image:""});setErrors({});}} style={{flex:1,background:"#fff",color:theme.muted,border:`1.5px solid ${theme.border}`,borderRadius:10,padding:"13px",fontWeight:600,fontSize:13,cursor:"pointer"}}>❌ ยกเลิก</button>
      </div>
      <div style={{background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:10,padding:"9px 14px",marginTop:12,fontSize:11,color:"#7B6000"}}>⚠️ <strong>หมายเหตุ:</strong> ช่องที่มี * คือข้อมูลบังคับกรอก</div>
    </div>
  );
}

function WithdrawPage({ stockItems, users, onSave, goToHistory }) {

  useEffect(() => {
    const h = e => { if (userRef.current && !userRef.current.contains(e.target)) setUserDropOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);

  const filteredUsers = userSearch.length>0 ? users.filter(u=>u.name.includes(userSearch)||u.dept.includes(userSearch)) : users;

  const selectItem = (i,item) => setRows(prev=>prev.map((r,idx)=>idx===i?{...r,itemId:item.id,itemName:item.name,unit:item.unit,stock:item.stock,price:item.price,qty:""}:r));
  const clearRow = i => setRows(prev=>prev.map((r,idx)=>idx===i?{...emptyRow}:r));
  const filledRows = rows.filter(r=>r.itemId);
  const grandTotal = filledRows.reduce((s,r)=>s+((parseFloat(r.price)||0)*(parseFloat(r.qty)||0)),0);

  return (
    <div>

            <label style={{fontSize:10,fontWeight:600,color:theme.primary}}>ชื่อผู้เบิก * <span style={{color:theme.muted,fontWeight:400}}>(เลือกจากรายชื่อ)</span></label>

          if (filledRows.length === 0) { setSaveError("⚠️ กรุณาเลือกรายการที่ต้องการเบิก"); return; }
          const txn = {
            id: "TXN-" + Date.now(),
            date: header.date,
            type: "เบิก",
            requester: header.requester,
            dept: header.dept,
            purpose: header.purpose,
            items: filledRows.map(r=>({id:r.itemId,name:r.itemName,qty:parseFloat(r.qty)||0,price:parseFloat(r.price)||0,unit:r.unit,note:r.note})),
            total: grandTotal,
            status: "บันทึกแล้ว"
          };
          // คำนวณ stock ที่เหลือ
          const updatedItems = stockItems.map(item => {

            if (found) return {...item, stock: Math.max(0, item.stock - found.qty)};
            return item;
          });
          if (onSave) onSave(txn, updatedItems);
          setSaved(true);
          setTimeout(()=>{
            setSaved(false);
            setRows(Array.from({length:20},()=>({...emptyRow})));
            setHeader({date:today,requesterId:"",requester:"",dept:"",purpose:""});
            setUserSearch("");
            if (goToHistory) goToHistory();
          }, 1200);
        }}
          style={{flex:2,background:theme.gradient,color:"#fff",border:"none",borderRadius:10,padding:"13px",fontWeight:700,fontSize:14,cursor:"pointer",boxShadow:"0 4px 14px rgba(139,26,74,0.3)"}}>

        </button>
        <button onClick={()=>setRows(Array.from({length:20},()=>({...emptyRow})))}
          style={{flex:1,background:"#fff",color:theme.muted,border:`1.5px solid ${theme.border}`,borderRadius:10,padding:"13px",fontWeight:600,fontSize:13,cursor:"pointer"}}>
          🗑️ ล้างทั้งหมด

    </div>
  );
}

// ─── HISTORY ───
function HistoryPage({ history, setHistory }) {
  const [filter, setFilter] = useState("ทั้งหมด");
  const [delConfirm, setDelConfirm] = useState(null);
  const [delAll, setDelAll] = useState(false);

  const filtered = filter==="ทั้งหมด" ? history : history.filter(h=>h.type===filter);
  const sc = s => s==="อนุมัติ"||s==="บันทึกแล้ว"?{bg:"#E8F5E9",text:"#2e7d32"}:s==="คืนแล้ว"?{bg:"#E3F2FD",text:"#1565C0"}:{bg:"#FFF8E1",text:"#E65100"};

  const deleteOne = id => {
    setHistory(p=>p.filter(h=>h.id!==id));
    if (window._db) window._db.collection('history').doc(id).delete().catch(console.error);
    setDelConfirm(null);
  };
  const deleteAll = () => {
    history.forEach(h => {
      if (window._db) window._db.collection('history').doc(h.id).delete().catch(console.error);
    });
    setHistory([]);
    setDelAll(false);
  };

  return (
    <div>
      {/* Filter + ลบทั้งหมด */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {["ทั้งหมด","เบิก","คืน","รับเข้า"].map(t=>(
            <button key={t} onClick={()=>setFilter(t)}
              style={{padding:"6px 14px",borderRadius:20,border:`1.5px solid ${filter===t?theme.primary:theme.border}`,background:filter===t?theme.gradient:"#fff",color:filter===t?"#fff":theme.muted,fontSize:12,fontWeight:filter===t?700:400,cursor:"pointer"}}>
              {t}
            </button>
          ))}
        </div>
        {history.length > 0 && (
          delAll
            ? <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:11,color:"#e53935"}}>ลบประวัติทั้งหมด?</span>
                <button onClick={deleteAll} style={{background:"#e53935",color:"#fff",border:"none",borderRadius:7,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>ยืนยัน</button>
                <button onClick={()=>setDelAll(false)} style={{background:"#f5f5f5",color:theme.muted,border:"none",borderRadius:7,padding:"5px 10px",fontSize:11,cursor:"pointer"}}>ยกเลิก</button>
              </div>
            : <button onClick={()=>setDelAll(true)}
                style={{background:"#FFEBEE",color:"#e53935",border:"1px solid #FFCDD2",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                🗑️ ลบทั้งหมด
              </button>
        )}
      </div>

      {/* สรุปจำนวน */}
      <div style={{fontSize:11,color:theme.muted,marginBottom:10}}>แสดง {filtered.length} รายการ {filter!=="ทั้งหมด"?`(กรอง: ${filter})`:`จาก ${history.length} ทั้งหมด`}</div>

      {/* ไม่มีข้อมูล */}
      {filtered.length===0 && (
        <div style={{textAlign:"center",padding:48,color:theme.muted,fontSize:13,background:"#fff",borderRadius:14,border:`1px solid ${theme.border}`}}>
          📭 ไม่มีประวัติในหมวดนี้
        </div>
      )}

      {/* รายการ */}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.map((tx,i) => {
          const c=sc(tx.status);
          return (
            <div key={tx.id} style={{background:"#fff",borderRadius:12,border:`1px solid ${theme.border}`,padding:"12px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13}}>
                    {tx.items && tx.items.length>0 ? tx.items.map(i=>i.name).join(", ") : (tx.item || "-")}
                  </div>
                  <div style={{fontSize:10,color:theme.muted,marginTop:2}}>{tx.id} · {tx.date}</div>
                </div>
                <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                  <div style={{fontWeight:800,fontSize:14,color:theme.primary}}>{tx.total.toLocaleString()} ฿</div>
                  <div style={{fontSize:10,background:c.bg,color:c.text,borderRadius:20,padding:"2px 8px",fontWeight:600}}>{tx.status}</div>
                </div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",gap:6}}>
                  <span style={{fontSize:10,background:tx.type==="เบิก"?theme.light:tx.type==="คืน"?"#E3F2FD":"#E8F5E9",color:tx.type==="เบิก"?theme.primary:tx.type==="คืน"?"#1565C0":"#2e7d32",borderRadius:20,padding:"2px 10px",fontWeight:600}}>{tx.type}</span>
                  <span style={{fontSize:10,color:theme.muted}}>
                    {tx.items ? `${tx.items.reduce((s,i)=>s+i.qty,0)} ชิ้น` : `${tx.qty||0} ชิ้น`} · {tx.requester} · {tx.dept}
                  </span>
                </div>
                {/* ปุ่มลบ */}
                {delConfirm===tx.id
                  ? <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      <span style={{fontSize:10,color:"#e53935"}}>ลบ?</span>
                      <button onClick={()=>deleteOne(tx.id)} style={{background:"#e53935",color:"#fff",border:"none",borderRadius:6,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>ยืนยัน</button>
                      <button onClick={()=>setDelConfirm(null)} style={{background:"#f5f5f5",color:theme.muted,border:"none",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>ยกเลิก</button>
                    </div>
                  : <button onClick={()=>setDelConfirm(tx.id)}
                      style={{background:"#FFEBEE",color:"#e53935",border:"1px solid #FFCDD2",borderRadius:7,padding:"4px 10px",fontSize:11,cursor:"pointer",flexShrink:0}}>
                      🗑️
                    </button>
                }
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── REPORTS ───
function ReportsPage({ stockItems, history }) {
  // สถิติจาก stockItems จริง
  const categories = [...new Set(stockItems.map(i=>i.category))];
  const totalValue = stockItems.reduce((s,i)=>s+i.stock*i.price,0);
  const totalItems = stockItems.reduce((s,i)=>s+i.stock,0);

  // Pie chart จาก stock จริง
  const catTotals = categories.map(cat=>({
    cat,
    val: stockItems.filter(i=>i.category===cat).reduce((s,i)=>s+i.stock,0)
  })).filter(c=>c.val>0);
  const pieTotal = catTotals.reduce((s,c)=>s+c.val,0);
  const pieColors = ["#1565C0",theme.primary,"#2E7D32","#E65100","#7B1FA2","#00838F","#558B2F","#AD1457"];

  let cumAngle = -90;
  const pieParts = catTotals.map((c,i)=>{
    const pct = pieTotal>0?(c.val/pieTotal):0;
    const angle = pct*360;
    const start = cumAngle; cumAngle+=angle;
    const toRad = a=>a*Math.PI/180;
    const R=60,cx=80,cy=80;
    const x1=cx+R*Math.cos(toRad(start)),y1=cy+R*Math.sin(toRad(start));
    const x2=cx+R*Math.cos(toRad(start+angle)),y2=cy+R*Math.sin(toRad(start+angle));
    return {...c,pct:Math.round(pct*100),color:pieColors[i%pieColors.length],d:`M${cx},${cy} L${x1},${y1} A${R},${R},0,${angle>180?1:0},1,${x2},${y2} Z`};
  });

  // Top 5 มูลค่า
  const topValue = [...stockItems].sort((a,b)=>b.stock*b.price-a.stock*a.price).slice(0,5);
  const maxVal = topValue.length>0?topValue[0].stock*topValue[0].price:1;

  // Top 5 จำนวน
  const topStock = [...stockItems].sort((a,b)=>b.stock-a.stock).slice(0,5);
  const maxStock = topStock.length>0?topStock[0].stock:1;

  if (stockItems.length===0) return (
    <div style={{textAlign:"center",padding:48,background:"#fff",borderRadius:14,border:`1px solid ${theme.border}`,color:theme.muted}}>
      <div style={{fontSize:32,marginBottom:8}}>📊</div>
      <div style={{fontSize:13}}>ยังไม่มีข้อมูล Stock — กรุณาเพิ่มรายการก่อนครับ</div>
    </div>
  );

  return (
    <div>
      {/* KPI */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[
          {icon:"📦",label:"รายการทั้งหมด",value:stockItems.length,unit:"รายการ",color:theme.primary},
          {icon:"💰",label:"มูลค่ารวม",value:totalValue.toLocaleString(),unit:"บาท",color:"#1565C0"},
          {icon:"🔢",label:"จำนวนรวม",value:totalItems.toLocaleString(),unit:"ชิ้น",color:"#2E7D32"},
          {icon:"🗂️",label:"หมวดหมู่",value:categories.length,unit:"หมวด",color:"#E65100"},
        ].map((c,i)=>(
          <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 14px",border:`1px solid ${theme.border}`}}>
            <div style={{fontSize:20,marginBottom:4}}>{c.icon}</div>
            <div style={{fontSize:18,fontWeight:800,color:c.color}}>{c.value}</div>
            <div style={{fontSize:10,color:theme.muted}}>{c.unit}</div>
            <div style={{fontSize:11,color:theme.text,fontWeight:600,marginTop:2}}>{c.label}</div>
          </div>
        ))}
      </div>

      {/* Pie — สัดส่วนหมวดหมู่ */}
      <div style={{background:"#fff",borderRadius:14,border:`1px solid ${theme.border}`,overflow:"hidden",marginBottom:14}}>
        <div style={{background:"linear-gradient(135deg,#2E7D32,#66BB6A)",padding:"10px 16px"}}>
          <span style={{fontWeight:700,color:"#fff",fontSize:13}}>🥧 สัดส่วน Stock ตามหมวดหมู่</span>
        </div>
        {pieTotal===0
          ? <div style={{padding:24,textAlign:"center",color:theme.muted,fontSize:12}}>ไม่มีข้อมูล</div>
          : <div style={{padding:16,display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
              <svg width="160" height="160" viewBox="0 0 160 160" style={{flexShrink:0}}>
                {catTotals.length===1
                  ? <circle cx="80" cy="80" r="60" fill={pieParts[0].color}/>
                  : pieParts.map((p,i)=><path key={i} d={p.d} fill={p.color} stroke="#fff" strokeWidth="2"/>)
                }
              </svg>
              <div style={{flex:1}}>
                {pieParts.map((c,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                    <div style={{width:12,height:12,borderRadius:3,background:c.color,flexShrink:0}}/>
                    <div style={{fontSize:12,flex:1}}>{c.cat}</div>
                    <div style={{fontSize:11,color:theme.muted}}>{c.val} ชิ้น</div>
                    <div style={{fontWeight:700,fontSize:12,color:c.color,minWidth:36,textAlign:"right"}}>{c.pct}%</div>
                  </div>
                ))}
              </div>
            </div>
        }
      </div>

// ─── SUMMARY PAGE ───
function SummaryPage({ history }) {
  const [period, setPeriod] = useState("month");
  const [selectedMonth, setSelectedMonth] = useState(() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  });
  const [selectedYear, setSelectedYear] = useState(() => String(new Date().getFullYear()));

  // กรองเฉพาะประวัติที่เป็น "เบิก"
  const withdrawHistory = history.filter(h => h.type === "เบิก");

  // กรองตาม period
  const filtered = withdrawHistory.filter(h => {
    if (!h.date) return false;
    if (period === "month") return h.date.startsWith(selectedMonth);
    if (period === "year")  return h.date.startsWith(selectedYear);
    return true; // all
  });

  // คำนวณยอดรวม
  const totalAmount = filtered.reduce((s,h) => s + (h.total||0), 0);
  const totalItems  = filtered.reduce((s,h) => s + (h.items ? h.items.reduce((a,i)=>a+i.qty,0) : 0), 0);
  const totalTxn    = filtered.length;

  // สรุปแยกตามผู้เบิก
  const byPerson = {};
  filtered.forEach(h => {
    const key = h.requester || "ไม่ระบุ";
    if (!byPerson[key]) byPerson[key] = {name:key, dept:h.dept||"", txn:0, qty:0, amount:0};
    byPerson[key].txn++;
    byPerson[key].qty += h.items ? h.items.reduce((a,i)=>a+i.qty,0) : 0;
    byPerson[key].amount += h.total||0;
  });
  const personList = Object.values(byPerson).sort((a,b)=>b.amount-a.amount);

  // สรุปแยกตามรายการ
  const byItem = {};
  filtered.forEach(h => {
    (h.items||[]).forEach(it => {
      if (!it.name) return;
      if (!byItem[it.name]) byItem[it.name] = {name:it.name, qty:0, amount:0, times:0};
      byItem[it.name].qty    += it.qty||0;
      byItem[it.name].amount += (it.qty||0)*(it.price||0);
      byItem[it.name].times++;
    });
  });
  const itemList = Object.values(byItem).sort((a,b)=>b.amount-a.amount);

  // สรุปแยกตามแผนก
  const byDept = {};
  filtered.forEach(h => {
    const key = h.dept || "ไม่ระบุ";
    if (!byDept[key]) byDept[key] = {dept:key, txn:0, amount:0};
    byDept[key].txn++;
    byDept[key].amount += h.total||0;
  });
  const deptList = Object.values(byDept).sort((a,b)=>b.amount-a.amount);

  // ปีที่มีในประวัติ
  const years = [...new Set(withdrawHistory.map(h=>h.date?.substring(0,4)).filter(Boolean))].sort((a,b)=>b-a);
  const months = Array.from({length:12},(_,i)=>{
    const m = String(i+1).padStart(2,"0");
    return {val:`${selectedYear}-${m}`, label:`${["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."][i]} ${selectedYear}`};
  });

  const card = (icon,label,value,unit,color) => (
    <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",border:`1px solid ${theme.border}`,boxShadow:"0 2px 8px rgba(139,26,74,0.07)"}}>
      <div style={{fontSize:20,marginBottom:4}}>{icon}</div>
      <div style={{fontSize:18,fontWeight:800,color}}>{value}</div>
      <div style={{fontSize:10,color:theme.muted}}>{unit}</div>
      <div style={{fontSize:11,color:theme.text,fontWeight:600,marginTop:2}}>{label}</div>
    </div>
  );

  return (
    <div>
      {/* Period Selector */}
      <div style={{background:"#fff",borderRadius:12,padding:14,marginBottom:14,border:`1px solid ${theme.border}`}}>
        <div style={{fontWeight:700,color:theme.primary,marginBottom:10,fontSize:13}}>📅 เลือกช่วงเวลา</div>
        <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          {[{v:"month",l:"รายเดือน"},{v:"year",l:"รายปี"},{v:"all",l:"ทั้งหมด"}].map(p=>(
            <button key={p.v} onClick={()=>setPeriod(p.v)}
              style={{padding:"6px 16px",borderRadius:20,border:`1.5px solid ${period===p.v?theme.primary:theme.border}`,background:period===p.v?theme.gradient:"#fff",color:period===p.v?"#fff":theme.muted,fontSize:12,fontWeight:period===p.v?700:400,cursor:"pointer"}}>
              {p.l}
            </button>
          ))}
        </div>
        {period==="month" && (
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <select value={selectedYear} onChange={e=>{setSelectedYear(e.target.value);setSelectedMonth(`${e.target.value}-${selectedMonth.split("-")[1]}`);}}
              style={{border:`1.5px solid ${theme.border}`,borderRadius:8,padding:"6px 10px",fontSize:12,outline:"none",background:"#fafafa"}}>
              {(years.length?years:[String(new Date().getFullYear())]).map(y=><option key={y}>{y}</option>)}
            </select>
            <select value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}
              style={{border:`1.5px solid ${theme.border}`,borderRadius:8,padding:"6px 10px",fontSize:12,outline:"none",background:"#fafafa",flex:1}}>
              {months.map(m=><option key={m.val} value={m.val}>{m.label}</option>)}
            </select>
          </div>
        )}
        {period==="year" && (
          <select value={selectedYear} onChange={e=>setSelectedYear(e.target.value)}
            style={{border:`1.5px solid ${theme.border}`,borderRadius:8,padding:"6px 10px",fontSize:12,outline:"none",background:"#fafafa"}}>
            {(years.length?years:[String(new Date().getFullYear())]).map(y=><option key={y}>{y}</option>)}
          </select>
        )}
      </div>

      {filtered.length===0 ? (
        <div style={{textAlign:"center",padding:48,background:"#fff",borderRadius:14,border:`1px solid ${theme.border}`,color:theme.muted}}>
          <div style={{fontSize:32,marginBottom:8}}>📭</div>
          <div style={{fontSize:13}}>ไม่มีข้อมูลการเบิกในช่วงเวลานี้</div>
        </div>
      ) : (
        <>
          {/* KPI */}

const tabs=[
  {id:"dashboard",label:"🏠",fullLabel:"Dashboard"},
  {id:"stocklist",label:"📋",fullLabel:"รายการ"},
  {id:"addstock", label:"➕",fullLabel:"เพิ่ม"},
  {id:"withdraw", label:"📤",fullLabel:"เบิก"},
  {id:"history",  label:"📜",fullLabel:"ประวัติ"},
  {id:"summary",  label:"📑",fullLabel:"สรุป"},
  {id:"reports",  label:"📊",fullLabel:"รายงาน"},
  {id:"users",    label:"👥",fullLabel:"ผู้ใช้"},
];
const titles={dashboard:"📦 ภาพรวม Stock",stocklist:"📋 รายการ Stock ทั้งหมด",addstock:"➕ เพิ่มรายการ Stock ใหม่",withdraw:"📤 ฟอร์มเบิกอุปกรณ์",history:"📜 ประวัติการเบิก-คืน",summary:"📑 สรุปยอดเบิก",reports:"📊 รายงาน & กราฟ",users:"👥 จัดการผู้ใช้งาน"};

function App() {
  const [activeTab, setActiveTab] = useState("dashboard");
  const [users, setUsers] = useState([]);
  const [stockItems, setStockItems] = useState([]);
  const [categories, setCategories] = useState(initialCategories);
  const [fbLoaded, setFbLoaded] = useState(false);
  const [syncing, setSyncing] = useState(true);
  const [history, setHistory] = useState([]);
  const [fbError, setFbError] = useState(false);
  const [depts, setDepts] = useState(initialDepts);

  // โหลดข้อมูลจาก Firebase เมื่อพร้อม
  useEffect(() => {
    const init = async () => {
      if (!window._db) return;
      setSyncing(true);
      setFbError(false);
      try {
        const [items, us, hist] = await Promise.all([
          fbLoadAll("stockItems"),
          fbLoadAll("users"),
          fbLoadAll("history"),
        ]);
        // ใช้ข้อมูลจาก Firebase เสมอ ถ้าไม่มีใน Firebase ค่อยใช้ default
        setStockItems(items.length > 0 ? items : initialStockItems);
        setUsers(us.length > 0 ? us : initialUsers);
        setHistory(hist.length > 0 ? hist.sort((a,b)=>b.id.localeCompare(a.id)) : []);
        // ถ้า Firebase ว่างเปล่า (ครั้งแรก) ให้ sync ข้อมูล default ขึ้นไป
        if (items.length === 0) {
          initialStockItems.forEach(item => fbSaveItem(item).catch(()=>{}));
        }
        if (us.length === 0) {
          initialUsers.forEach(u => fbSaveUser(u).catch(()=>{}));
        }
        setFbLoaded(true);
      } catch(e) {
        console.error("Firebase error:", e);
        setFbError(true);
        // fallback ใช้ข้อมูล default ถ้าเชื่อมต่อไม่ได้
        setStockItems(initialStockItems);
        setUsers(initialUsers);
        setHistory([]);
      } finally {
        setSyncing(false);
      }
    };
    // compat version โหลดก่อน babel เสมอ
    if (window._db) {
      init();
    } else {
      // safety: รอสักครู่แล้วลองใหม่
      const t = setTimeout(init, 300);
      return () => clearTimeout(t);
    }
  }, []);

  // Wrapper: setStockItems + sync Firebase
  const setStockItemsSync = (updater) => {
    setStockItems(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (window._db) {
        const prevMap = new Map(prev.map(i=>[i.id,i]));
        const nextIds = new Set(next.map(i=>i.id));
        // เพิ่ม/อัปเดต เฉพาะที่เปลี่ยน
        next.forEach(item => {
          const old = prevMap.get(item.id);
          if (!old || JSON.stringify(old) !== JSON.stringify(item))
            fbSaveItem(item).catch(console.error);
        });
        // ลบ
        prev.forEach(item => { if(!nextIds.has(item.id)) fbDeleteItem(item.id).catch(console.error); });
      }
      return next;
    });
  };

  // Wrapper: setUsers + sync Firebase
  const setUsersSync = async (updater) => {
    setUsers(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (window._db) {
        next.forEach(u => { fbSaveUser(u).catch(console.error); });
        prev.forEach(u => { if(!next.find(x=>x.id===u.id)) fbDeleteUser(u.id).catch(console.error); });
      }
      return next;
    });
  };

  // Loading screen ขณะรอ Firebase
  if (syncing && !fbLoaded && !fbError) return (
    <div style={{fontFamily:"'Sarabun',sans-serif",background:"#f5f5f7",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{background:theme.gradient,width:64,height:64,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,boxShadow:"0 4px 20px rgba(139,26,74,0.3)"}}>📦</div>
      <div style={{fontWeight:700,fontSize:18,color:theme.primary}}>ระบบจัดการสต๊อก</div>
      <div style={{fontSize:13,color:theme.muted}}>⏳ กำลังโหลดข้อมูลจาก Firebase...</div>
      <div style={{width:200,height:4,background:"#F2C4D4",borderRadius:4,overflow:"hidden"}}>
        <div style={{height:"100%",background:theme.gradient,borderRadius:4,animation:"slide 1.5s infinite",width:"60%"}}/>
      </div>
      <style>{`@keyframes slide { 0%{margin-left:-60%} 100%{margin-left:100%} }`}</style>
    </div>
  );

  return (
    <div style={{fontFamily:"'Sarabun',sans-serif",background:"#f5f5f7",minHeight:"100vh"}}>
      <div style={{background:theme.gradient,padding:"18px 20px 14px",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 20px rgba(139,26,74,0.25)"}}>
        <div style={{fontSize:9,color:"rgba(255,255,255,0.6)",letterSpacing:3,textTransform:"uppercase",marginBottom:2}}>STOCK MANAGEMENT SYSTEM</div>
        <h1 style={{margin:"0 0 2px",fontSize:20,fontWeight:800,color:"#fff"}}>{titles[activeTab]}</h1>
        <p style={{margin:0,color:"rgba(255,255,255,0.7)",fontSize:11}}>
          พาส & อุปกรณ์สำนักงาน
          {syncing && !fbLoaded && <span style={{marginLeft:8,fontSize:10,background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"1px 8px"}}>⏳ กำลังซิงค์...</span>}
          {fbLoaded && !syncing && <span style={{marginLeft:8,fontSize:10,background:"rgba(255,255,255,0.2)",borderRadius:20,padding:"1px 8px"}}>🔥 Firebase ✅</span>}
          {fbError && <span style={{marginLeft:8,fontSize:10,background:"rgba(255,100,100,0.3)",borderRadius:20,padding:"1px 8px"}}>⚠️ ออฟไลน์</span>}
        </p>
      </div>
      <div style={{display:"flex",background:"#fff",borderBottom:`2px solid ${theme.border}`,overflowX:"auto",position:"sticky",top:78,zIndex:99,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        {tabs.map(tab=>(
          <button key={tab.id} onClick={()=>setActiveTab(tab.id)}
            style={{flex:"1 0 auto",minWidth:60,padding:"10px 8px 8px",border:"none",background:activeTab===tab.id?theme.light:"transparent",color:activeTab===tab.id?theme.primary:theme.muted,fontWeight:activeTab===tab.id?700:400,fontSize:10,cursor:"pointer",borderBottom:activeTab===tab.id?`3px solid ${theme.primary}`:"3px solid transparent",fontFamily:"'Sarabun',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:16}}>{tab.label}</span>
            <span style={{whiteSpace:"nowrap"}}>{tab.fullLabel}</span>
          </button>
        ))}
      </div>
      <div style={{padding:"16px 12px 32px",maxWidth:900,margin:"0 auto"}}>
        {activeTab==="dashboard" && <DashboardPage stockItems={stockItems}/>}
        {activeTab==="stocklist" && <StockListPage stockItems={stockItems} setStockItems={setStockItemsSync} categories={categories}/>}
        {activeTab==="addstock"  && <AddStockPage categories={categories} setCategories={setCategories} onAddItem={item=>setStockItemsSync(p=>[...p,item])}/>}
        {activeTab==="withdraw"  && <WithdrawPage stockItems={stockItems} users={users}
          onSave={(txn, updatedItems) => {
            // บันทึกประวัติ
            setHistory(prev => [txn, ...prev]);
            if (window._db) window._db.collection('history').doc(txn.id).set(txn).catch(console.error);
            // ลด stock
            if (updatedItems) {
              setStockItemsSync(() => updatedItems);
            }
          }}
          goToHistory={() => setActiveTab("history")}
        />}
        {activeTab==="history"   && <HistoryPage history={history} setHistory={setHistory}/>}
        {activeTab==="summary"   && <SummaryPage history={history}/>}
        {activeTab==="reports"   && <ReportsPage stockItems={stockItems} history={history}/>}
        {activeTab==="users"     && <UsersPage users={users} setUsers={setUsersSync} depts={depts} setDepts={setDepts}/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
